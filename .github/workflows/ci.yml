name: BrainBytes CI

on: 
  push: 
    branches: [ main, initial, mj-automation ]
  pull_request:
    branches: [ main, initial, mj-automation ]
  workflow_dispatch:

jobs:
  test: 
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install

      - name: Run frontend tests
        working-directory: ./brainbytes-multi-container/frontend
        run: npm test

      - name: Run Frontend tests with coverage
        working-directory: ./brainbytes-multi-container/frontend
        run: npm run test:coverage

      - name: Install backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm install

      - name: Run backend tests
        working-directory: ./brainbytes-multi-container/backend
        run: npm test

      - name: Run Backend tests with coverage
        working-directory: ./brainbytes-multi-container/backend
        run: npm run test:coverage

      - name: Upload test coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            frontend/coverage
            backend/coverage

