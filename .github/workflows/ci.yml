name: BrainBytes CI

on: 
  workflow_dispatch:

jobs:
  test: 
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Start backend
        working-directory: ./brainbytes-multi-container/backend
        run: |
          npm install
          npm start &
          sleep 15

      - name: Run frontend tests
        working-directory: ./brainbytes-multi-container/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: npm test

      - name: Run Frontend tests with coverage
        working-directory: ./brainbytes-multi-container/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Run backend tests
        working-directory: ./brainbytes-multi-container/backend
        run: npm test

      - name: Run Backend tests with coverage
        working-directory: ./brainbytes-multi-container/backend
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Upload test coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            brainbytes-multi-container/frontend/coverage
            brainbytes-multi-container/backend/coverage

