name: BrainBytes Deploy

on:
  push:
    branches: [ main, initial ]
  workflow_dispatch:

jobs: 
  deploy: 
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    environment: test
    needs: build

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v2

      - name: Node.js setup
        uses: actions/setup-node@v2
        with: 
          node-version: ${{ matrix.node-version }}

      - name: Build Docker images
        run: docker-compose build

      - name: Prepare deoployment
        run: | 
          echo "DEPLOY_TIME=$(date)" >> $GITHUB_ENV
          echo "DEPLOY_SHA=${{ github.sha }}" >> $GITHUB_ENV

      - name: Deploy to Test Environment
        run: |
          echo "Deploying to test environment..."
          echo "This is a placeholder for your actual deployment script"
          echo "In future weeks, this will deploy to Oracle Cloud"

      - name: Verify Deployment
        run: |
          echo "Verifying deployment..."
          curl -s http://localhost:3000/health || echo "Service not available yet"

      - name: Download build artifacts
        uses: actions/download-artifact@v2
        with:
          name: docker-outputs 