name: BrainBytes Security Scan

on: 
  push: 
    branches: [ main, initial, mj-automation ]
  pull_request:
    branches: [ main, initial, mj-automation ]
  schedule: 
    - cron: '0 0 * * 0' 
  workflow_dispatch:

jobs: 
  security-scan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm audit --json || true

      - name: Install backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm ci

      - name: Audit backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm audit --json || true

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build Docker images
        run: docker-compose build

      - name: Scan Docker images with Trivy
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes/frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity-threshold: 'CRITICAL, HIGH'
          
      - name: Scan Docker images with Trivy
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes/backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity-threshold: 'CRITICAL,HIGH'