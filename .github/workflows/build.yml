name: BrainBytes Build

on:
  push:
    branches: [ main, initial, mj-automation ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, initial, mj-automation ]
  workflow_dispatch:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create mock environment file
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env
          echo "NODE_ENV=test" >> brainbytes-multi-container/backend/.env

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/frontend
          push: false
          tags: brainbytes-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/backend
          push: false
          tags: brainbytes-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose setup
        working-directory: ./brainbytes-multi-container
        run: | 
          docker compose up -d
          docker compose ps
          docker compose down
      
      - name: Create mock fallback outputs if missing
        run: |
          mkdir -p brainbytes-multi-container/frontend/build
          mkdir -p brainbytes-multi-container/backend/dist
          touch brainbytes-multi-container/frontend/build/placeholder.txt
          touch brainbytes-multi-container/backend/dist/placeholder.txt

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-outputs 
          path: brainbytes-multi-container