name: BrainBytes Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create mock environment file
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env
          echo "NODE_ENV=test" >> brainbytes-multi-container/backend/.env

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/frontend
          push: false
          load: true
          tags: brainbytes-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/backend
          push: false
          load: true
          tags: brainbytes-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose setup
        working-directory: ./brainbytes-multi-container
        run: | 
          docker compose up -d
          docker compose ps
          docker compose down

      - name: Save Docker images as artifacts
        run: |
          mkdir -p /tmp/images
          docker save brainbytes-frontend:latest -o /tmp/images/brainbytes-frontend.tar
          docker save brainbytes-backend:latest -o /tmp/images/brainbytes-backend.tar

      - name: Upload Docker images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/*.tar

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-outputs
          path: brainbytes-multi-container
          if-no-files-found: warn