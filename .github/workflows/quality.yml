name: BrainBytes Quality Checks

on: 
  push: 
    branches: [ main, initial, mj-automation ]
  pull_request:
    branches: [ main, initial, mj-automation ]
  workflow_dispatch:

jobs:
  lint:
    name: Run Linters
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm ci

      - name: Lint Frontend code
        working-directory: ./brainbytes-multi-container/frontend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Annotate Frontend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          report-token: "${{ secrets.GITHUB_TOKEN }}"
          report-path: frontend/eslint-report.json

      - name: Install Backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm ci

      - name: Lint Backend code
        working-directory: ./brainbytes-multi-container/backend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true
          
      - name: Annotate Backend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          report-token: "${{ secrets.GITHUB_TOKEN }}"
          report-path: backend/eslint-report.json

      - name: Uplaod ESLint reports
        uses: actions/upload-artifact@v4
        with:
          name: eslint-reports
          path: |
            frontend/eslint-report.json
            backend/eslint-report.json