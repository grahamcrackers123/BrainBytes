name: BrainBytes CI/CD

on:
  push:
    branches: [ main, initial, mj-automation ]
  pull_request:
    branches: [ main, initial, mj-automation ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  lint:
    name: Run Linters
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install Frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Lint Frontend code
        working-directory: ./brainbytes-multi-container/frontend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Annotate Frontend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          report-json: "brainbytes-multi-container/frontend/eslint-report.json"

      - name: Install Backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm install

      - name: Lint Backend code
        working-directory: ./brainbytes-multi-container/backend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true
          
      - name: Annotate Backend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          report-json: "brainbytes-multi-container/backend/eslint-report.json"

      - name: Uplaod ESLint reports
        uses: actions/upload-artifact@v4
        with:
          name: eslint-reports
          path: |
            brainbytes-multi-container/frontend/eslint-report.json
            brainbytes-multi-container/backend/eslint-report.json

  test: 
    name: Run Tests
    needs: lint 
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' || mongo --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Start backend
        working-directory: ./brainbytes-multi-container/backend
        env:
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
        run: |
          npm install
          npm start &
          sleep 15
          echo "--- backend.log ---"
          cat backend.log
          echo "--- checking port ---"
          curl -sv http://localhost:3000/ || echo "localhost:3000 not responding yet"

      - name: Run frontend tests
        working-directory: ./brainbytes-multi-container/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: npm test

      - name: Run Frontend tests with coverage
        working-directory: ./brainbytes-multi-container/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Run backend tests
        working-directory: ./brainbytes-multi-container/backend
        env:
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
        run: npm test

      - name: Run Backend tests with coverage
        working-directory: ./brainbytes-multi-container/backend
        env:
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Upload test coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            brainbytes-multi-container/frontend/coverage
            brainbytes-multi-container/backend/coverage

  build:
    name: Build Project
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create mock environment file
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env
          echo "NODE_ENV=test" >> brainbytes-multi-container/backend/.env

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/frontend
          push: false
          load: true
          tags: brainbytes-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/backend
          push: false
          load: true
          tags: brainbytes-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose setup
        working-directory: ./brainbytes-multi-container
        run: | 
          docker compose up -d
          docker compose ps
          docker compose down

      - name: Save Docker images as artifacts
        run: |
          mkdir -p /tmp/images
          docker save brainbytes-frontend:latest -o /tmp/images/brainbytes-frontend.tar
          docker save brainbytes-backend:latest -o /tmp/images/brainbytes-backend

      - name: Upload Docker images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/*.tar

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-outputs
          path: brainbytes-multi-container
          if-no-files-found: warn

  deploy: 
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    environment: test
    needs: 
      - build
      - e2e

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-outputs 
          path: brainbytes-multi-container

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}

      - name: Create mock environment file for deploy
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Prepare deployment
        run: | 
          echo "DEPLOY_TIME=$(date)" >> $GITHUB_ENV
          echo "DEPLOY_SHA=${{ github.sha }}" >> $GITHUB_ENV

      - name: Deploy to Test Environment
        run: |
          echo "Deploying to test environment..."
          echo "This is a placeholder for your actual deployment script"
          echo "In future weeks, this will deploy to Oracle Cloud"

      - name: Verify Deployment
        run: |
          echo "Verifying deployment..."
          curl -s http://localhost:3000/health || echo "Service not available yet"

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Audit frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm audit --json || true

      - name: Install backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm install

      - name: Audit backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm audit --json || true

      - name: Run Snyk to check Frontend vulnerabilities
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high brainbytes-multi-container/frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Run Snyk to check Backend vulnerabilities
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high brainbytes-multi-container/backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Create mock environment file for scanning
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Download Docker image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images

      - name: Load Docker images
        run: |
          docker load -i /tmp/images/frontend.tar
          docker load -i /tmp/images/backend.tar

      - name: Scan Frontend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Scan Backend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  e2e: 
    name: Run End-to-End Tests
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}

      - name: Install End-to-End Test dependencies
        working-directory: ./brainbytes-multi-container/e2e-tests
        run: npm install --legacy-peer-deps
            
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End Tests
        working-directory: ./brainbytes-multi-container/e2e-tests
        run: npm run test:e2e