name: BrainBytes CI/CD

on:
  push:
    branches: [ main, initial, mj-automation ]
  pull_request:
    branches: [ main, initial, mj-automation ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  lint:
    name: Run Linters
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install Frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Check for large files
        run: |
          echo "Checking for files larger than 10MB..."
          large_files=$(find . -size +10M -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null)
          if [ -n "$large_files" ]; then
            echo "Large files found:"
            echo "$large_files"
            echo "Please consider using .gitignore or Git LFS for large files."
          else
            echo "No large files found."
          fi

      - name: Check for potential secrets
        run: |
          echo "Checking for potential secrets in code..."
          found_secrets=false
          while IFS= read -r file; do
            if grep -q -E '(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})' "$file" 2>/dev/null; then
              echo "Warning: $file"
              found_secrets=true
            fi
          done < <(find . -type f \( -name '*.js' -o -name '*.json' -o -name '*.yml' -o -name '*.yaml' -o -name '*.env' \) -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null)
          if [ "$found_secrets" = true ]; then
            echo "Potential secrets detected!"
          else
            echo "No secrets patterns detected."
          fi

      - name: Run Prettier formatting check
        working-directory: ./brainbytes-multi-container/frontend
        run: npx prettier --check . || echo "Prettier found formatting issues. Run 'npm run format' to fix."

      - name: Lint Frontend code
        working-directory: ./brainbytes-multi-container/frontend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Annotate Frontend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          report-json: "brainbytes-multi-container/frontend/eslint-report.json"

      - name: Install Backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm install

      - name: Lint Backend code
        working-directory: ./brainbytes-multi-container/backend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true
          
      - name: Annotate Backend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          report-json: "brainbytes-multi-container/backend/eslint-report.json"

      - name: Uplaod ESLint reports
        uses: actions/upload-artifact@v4
        with:
          name: eslint-reports
          path: |
            brainbytes-multi-container/frontend/eslint-report.json
            brainbytes-multi-container/backend/eslint-report.json

  test: 
    name: Run Tests
    needs: lint 
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' || mongo --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Start backend
        working-directory: ./brainbytes-multi-container/backend
        env:
          GROQ_API_KEY: gsk-test-dummy-key-for-ci
          MONGO_URL: mongodb://localhost:27017/brainbytes
        run: |
          npm install
          touch backend.log
          nohup npm start > backend.log 2>&1 &
          sleep 10
          echo "--- backend.log ---"
          cat backend.log || echo "(log not available yet)"
          echo "--- checking port ---"
          curl -sv http://localhost:3000/ || echo "localhost:3000 not responding yet"

      - name: Run frontend tests
        working-directory: ./brainbytes-multi-container/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: npm test

      - name: Show backend log after frontend tests
        if: always()
        working-directory: ./brainbytes-multi-container/backend
        run: cat backend.log || echo "(no backend.log found)"

      - name: Run Frontend tests with coverage
        working-directory: ./brainbytes-multi-container/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Run backend tests
        working-directory: ./brainbytes-multi-container/backend
        env:
          GROQ_API_KEY: gsk-test-dummy-key-for-ci
          MONGO_URL: mongodb://localhost:27017/brainbytes
        run: npm test

      - name: Run Backend tests with coverage
        working-directory: ./brainbytes-multi-container/backend
        env:
          GROQ_API_KEY: gsk-test-dummy-key-for-ci
          MONGO_URL: mongodb://localhost:27017/brainbytes
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Upload test coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            brainbytes-multi-container/frontend/coverage
            brainbytes-multi-container/backend/coverage

      - name: Generate test summary report
        if: always()
        run: |
          echo "## Test Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Version | ${{ matrix.node-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See uploaded coverage-reports artifact for full coverage details." >> $GITHUB_STEP_SUMMARY

  build:
    name: Build Project
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create mock environment file
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env
          echo "NODE_ENV=test" >> brainbytes-multi-container/backend/.env

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/frontend
          push: false
          load: true
          tags: brainbytes-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/backend
          push: false
          load: true
          tags: brainbytes-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images exist
        run: |
          echo "--- docker images ---"
          docker images
          docker image inspect brainbytes-frontend:latest > /dev/null
          docker image inspect brainbytes-backend:latest > /dev/null

      - name: Save Docker images as artifacts
        run: |
          mkdir -p /tmp/images
          docker save brainbytes-frontend:latest -o /tmp/images/brainbytes-frontend.tar
          docker save brainbytes-backend:latest -o /tmp/images/brainbytes-backend.tar

      - name: Test Docker Compose setup
        working-directory: ./brainbytes-multi-container
        run: | 
          docker compose up -d
          docker compose ps
          docker compose down

      - name: Upload Docker images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images/*.tar

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-outputs
          path: brainbytes-multi-container
          if-no-files-found: warn

  deploy: 
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: test
    if: github.event_name != 'pull_request'
    needs: 
      - build
      - e2e

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-outputs 
          path: brainbytes-multi-container

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: 22.x

      - name: Create mock environment file
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Prepare deployment
        run: | 
          echo "DEPLOY_TIME=$(date)" >> $GITHUB_ENV
          echo "DEPLOY_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "DEPLOY_ENV=test" >> $GITHUB_ENV

      - name: Determine deployment target by branch
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "DEPLOY_TARGET=staging" >> $GITHUB_ENV
              ;;
            mj-automation)
              echo "DEPLOY_TARGET=test" >> $GITHUB_ENV
              ;;
            *)
              echo "DEPLOY_TARGET=test" >> $GITHUB_ENV
              ;;
          esac

      - name: Deploy application
        run: |
          echo "=== Deploying BrainBytes ==="
          echo "Environment:  test"
          echo "Branch:       ${{ github.ref_name }}"
          echo "Target SHA:   ${{ github.sha }}"
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh test
        shell: bash

      - name: Verify Deployment
        run: |
          echo "Verifying deployment..."
          sleep 5
          curl -s http://localhost:3000/health || echo "Service not available yet"

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Audit frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm audit --json || true

      - name: Install backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm install

      - name: Audit backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm audit --json || true

      - name: Run Snyk to check Frontend vulnerabilities
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high brainbytes-multi-container/frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Run Snyk to check Backend vulnerabilities
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high brainbytes-multi-container/backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Create mock environment file for scanning
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Download Docker image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images

      - name: Load Docker images
        run: |
          docker load -i /tmp/images/brainbytes-frontend.tar
          docker load -i /tmp/images/brainbytes-backend.tar

      - name: Scan Frontend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Scan Backend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  e2e: 
    name: Run End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}

      - name: Create mock environment file
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Start app with Docker Compose
        working-directory: ./brainbytes-multi-container
        run: |
          docker compose up -d --build
          echo "--- waiting for frontend to be ready ---"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7000 > /dev/null; then
              echo "Frontend is up"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          docker compose ps

      - name: Install End-to-End Test dependencies
        working-directory: ./brainbytes-multi-container/e2e-tests
        run: npm install --legacy-peer-deps
            
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End Tests
        working-directory: ./brainbytes-multi-container/e2e-tests
        env:
          E2E_BASE_URL: http://localhost:7000
        run: npm run test:e2e

      - name: Run performance test
        if: success()
        run: |
          echo "### Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          start_time=$(date +%s%N)
          http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7000/ 2>/dev/null || echo "000")
          end_time=$(date +%s%N)
          duration_ms=$(( (end_time - start_time) / 1000000 ))
          echo "| Homepage HTTP Status | $http_code |" >> $GITHUB_STEP_SUMMARY
          echo "| Homepage Load Time | ${duration_ms}ms |" >> $GITHUB_STEP_SUMMARY

      - name: Show app logs on failure
        if: failure()
        working-directory: ./brainbytes-multi-container
        run: docker compose logs
  
      - name: Stop Docker Compose
        if: always()
        working-directory: ./brainbytes-multi-container
        run: docker compose down

  notify:
    name: Send Status Notification
    runs-on: ubuntu-latest
    needs: 
      - lint
      - test
      - build
      - security-scan
      - e2e
      - deploy
    if: always()

    steps:
      - name: Check workflow status
        run: |
          echo "## BrainBytes CI/CD Status Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Linters | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Author: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ All checks passed and deployment completed successfully!"
          elif [ "${{ needs.deploy.result }}" = "skipped" ]; then
            echo "✅ All checks passed. (Deploy skipped for ${{ github.event_name }} event)"
          else
            echo "⚠️ Some checks failed. Review the run details above."
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = `## CI/CD Pipeline Failure\n\nRun: ${runUrl}\nBranch: \`${{ github.ref_name }}\`\nCommit: ${{ github.sha }}\nTrigger: ${{ github.event_name }}\n\nSee the workflow run for details on which job(s) failed.`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure'
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `CI/CD Pipeline Failure - ${{ github.run_id }}`,
                body: body,
                labels: ['ci-failure']
              });
            }