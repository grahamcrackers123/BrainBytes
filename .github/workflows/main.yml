name: BrainBytes CI/CD

on:
  push:
    branches: [ main, initial, mj-automation ]
  pull_request:
    branches: [ main, initial, mj-automation ]
  workflow_dispatch:

jobs:
  lint:
    name: Run Linters
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install Frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Lint Frontend code
        working-directory: ./brainbytes-multi-container/frontend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Annotate Frontend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          report-json: "brainbytes-multi-container/frontend/eslint-report.json"

      - name: Install Backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm install

      - name: Lint Backend code
        working-directory: ./brainbytes-multi-container/backend
        run: npm run lint:js -- --format json --output-file eslint-report.json
        continue-on-error: true
          
      - name: Annotate Backend ESLint results
        uses: ataylorme/eslint-annotate-action@v2
        with: 
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          report-json: "brainbytes-multi-container/backend/eslint-report.json"

      - name: Uplaod ESLint reports
        uses: actions/upload-artifact@v4
        with:
          name: eslint-reports
          path: |
            brainbytes-multi-container/frontend/eslint-report.json
            brainbytes-multi-container/backend/eslint-report.json

  test: 
    name: Run Tests
    needs: lint 
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Start backend
        working-directory: ./brainbytes-multi-container/backend
        run: |
          npm install
          npm start &
          sleep 15

      - name: Run frontend tests
        working-directory: ./brainbytes-multi-container/frontend
        run: npm test

      - name: Run Frontend tests with coverage
        working-directory: ./brainbytes-multi-container/frontend
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Run backend tests
        working-directory: ./brainbytes-multi-container/backend
        run: npm test

      - name: Run Backend tests with coverage
        working-directory: ./brainbytes-multi-container/backend
        run: npm test -- --coverage || echo "No coverage script setup found"

      - name: Upload test coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            brainbytes-multi-container/frontend/coverage
            brainbytes-multi-container/backend/coverage

  build:
    name: Build Project
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create mock environment file
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env
          echo "NODE_ENV=test" >> brainbytes-multi-container/backend/.env

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/frontend
          push: false
          tags: brainbytes-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/backend
          push: false
          tags: brainbytes-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose setup
        working-directory: ./brainbytes-multi-container
        run: | 
          docker compose up -d
          docker compose ps
          docker compose down

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-outputs
          path: |
            brainbytes-multi-container/frontend/build
            brainbytes-multi-container/backend/dist

  deploy: 
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    environment: test
    needs: 
      - build
      - e2e

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-outputs 
          path: brainbytes-multi-container

      - name: Node.js setup
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}

      - name: Create mock environment file for deploy
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Prepare deployment
        run: | 
          echo "DEPLOY_TIME=$(date)" >> $GITHUB_ENV
          echo "DEPLOY_SHA=${{ github.sha }}" >> $GITHUB_ENV

      - name: Deploy to Test Environment
        run: |
          echo "Deploying to test environment..."
          echo "This is a placeholder for your actual deployment script"
          echo "In future weeks, this will deploy to Oracle Cloud"

      - name: Verify Deployment
        run: |
          echo "Verifying deployment..."
          curl -s http://localhost:3000/health || echo "Service not available yet"

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Audit frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm audit --json || true

      - name: Install backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm install

      - name: Audit backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm audit --json || true

      - name: Run Snyk to check Frontend vulnerabilities
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high brainbytes-multi-container/frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Run Snyk to check Backend vulnerabilities
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high brainbytes-multi-container/backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Create mock environment file for scanning
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Build Docker images
        working-directory: ./brainbytes-multi-container
        run: docker compose build

      - name: Scan Frontend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity-threshold: 'CRITICAL, HIGH'

      - name: Scan Backend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity-threshold: 'CRITICAL,HIGH'

  e2e: 
    name: Run End-to-End Tests
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}

      - name: Install End-to-End Test dependencies
        working-directory: ./brainbytes-multi-container/e2e-tests
        run: npm install --legacy-peer-deps
            
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End Tests
        working-directory: ./brainbytes-multi-container/e2e-tests
        run: npm run test:e2e