name: Deploy to Oracle Cloud

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-oci:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/frontend
          push: false
          load: true
          tags: brainbytes-frontend:latest

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./brainbytes-multi-container/backend
          push: false
          load: true
          tags: brainbytes-backend:latest

      - name: Save and compress Docker images
        run: |
          mkdir -p /tmp/images
          docker save brainbytes-frontend:latest | gzip > /tmp/images/frontend.tar.gz
          docker save brainbytes-backend:latest | gzip > /tmp/images/backend.tar.gz

      - name: Transfer images to OCI instance
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER || 'ubuntu' }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: /tmp/images/frontend.tar.gz,/tmp/images/backend.tar.gz
          target: /tmp
          strip_components: 2

      - name: Deploy on OCI instance
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER || 'ubuntu' }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            echo "=== Loading Docker images ==="
            gunzip -c /tmp/frontend.tar.gz | docker load
            gunzip -c /tmp/backend.tar.gz | docker load

            echo "=== Creating env file ==="
            mkdir -p ~/brainbytes/backend
            cat > ~/brainbytes/backend/.env << ENVEOF
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            MONGO_URL=mongodb://mongo:27017/brainbytes
            NODE_ENV=production
            ENVEOF

            echo "=== Deploying with Docker Compose ==="
            cd ~/brainbytes
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Health check ==="
            sleep 10
            curl -sf http://localhost:3000/ && echo "Backend OK" || echo "Backend FAILED"
            curl -sf http://localhost:80/ && echo "Frontend OK" || echo "Frontend FAILED"
